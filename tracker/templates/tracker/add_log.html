{% extends 'tracker/base.html' %}

{% block title %}Добавить активность{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h2 class="mb-4">Добавить активность</h2>
            
            <form method="post">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="activity" class="form-label">Тип активности</label>
                    <select name="activity" id="activity" class="form-select" required>
                        <option value="">-- Выберите активность --</option>
                        {% regroup activities by get_category_display as category_list %}
                        {% for category in category_list %}
                            <optgroup label="{{ category.grouper }}">
                                {% for activity in category.list %}
                                    <option value="{{ activity.id }}">
                                        {{ activity.name }} ({{ activity.co2_factor }} кг CO₂ / {{ activity.unit }})
                                    </option>
                                {% endfor %}
                            </optgroup>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="mb-3">
                    <label for="value" class="form-label">Количество</label>
                    <input type="number" step="0.01" name="value" id="value" class="form-control" required>
                    <div class="form-text">Например: 25 км, 100 кВт·ч, 2 кг</div>
                </div>
                
                <div class="mb-3">
                    <label for="city" class="form-label">Город (для корректировки по погоде)</label>
                    <select name="city" id="city" class="form-select">
                        <option value="">-- Не указывать --</option>
                        {% for key, name in cities %}
                            <option value="{{ key }}">{{ name }}</option>
                        {% endfor %}
                    </select>
                    <div class="form-text">
                        Для транспортных активностей система учтёт погоду: 
                        холод и осадки увеличивают расход топлива
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="date" class="form-label">Дата</label>
                    <input type="date" name="date" id="date" class="form-control" value="{{ today }}" required>
                </div>
                
                <div class="mb-3">
                    <label for="notes" class="form-label">Комментарий (необязательно)</label>
                    <input type="text" name="notes" id="notes" class="form-control" maxlength="200">
                </div>
                
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">Сохранить</button>
                    <a href="{% url 'tracker:dashboard' %}" class="btn btn-outline-secondary btn-lg">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
